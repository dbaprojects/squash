<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squash Club</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Login ─────────────────────────────────────────────────────────────── -->
<div id="view-login" class="view">
  <div class="login-box">
    <h1>🎾 Squash Club</h1>
    <p>Sign in with your Google account</p>
    <button id="btn-google-signin" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18" style="margin-right:8px;vertical-align:middle">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Sign in with Google
    </button>
    <div id="login-error" class="error-msg"></div>
  </div>
</div>

<!-- ── App shell (shown after login) ─────────────────────────────────────── -->
<div id="view-app" class="view hidden">

  <header>
    <div class="header-left">
      <span class="logo">🎾 Squash Club</span>
      <span class="version-badge">v2.0</span>
    </div>
    <nav>
      <button class="nav-btn active" data-view="schedule">Schedule</button>
      <button class="nav-btn admin-only hidden" data-view="admin">Admin ▾</button>
    </nav>
    <div class="header-right">
      <span id="header-name"></span>
      <button id="btn-logout" class="btn-text">Sign out</button>
    </div>
  </header>

  <!-- ── Schedule view ────────────────────────────────────────────────────── -->
  <main id="view-schedule" class="section">
    <div class="section-header">
      <h2>Upcoming Sessions</h2>
    </div>
    <div id="event-list" class="card-grid"></div>
  </main>

  <!-- ── Event detail view ────────────────────────────────────────────────── -->
  <main id="view-event" class="section hidden">
    <button class="btn-back" id="btn-back-schedule">← Back to Schedule</button>
    <div id="event-detail"></div>
  </main>

  <!-- ── Admin view ───────────────────────────────────────────────────────── -->
  <main id="view-admin" class="section hidden admin-only">
    <div class="tabs">
      <button class="tab-btn active" data-tab="tab-players">Players</button>
      <button class="tab-btn" data-tab="tab-events">Events</button>
      <button class="tab-btn" data-tab="tab-templates">Templates</button>
    </div>

    <!-- Players tab -->
    <div id="tab-players" class="tab-panel">
      <div class="panel-header">
        <h3>Players</h3>
        <button class="btn-primary" id="btn-add-player">+ Add Player</button>
      </div>
      <div id="players-table-wrap"></div>
    </div>

    <!-- Events tab -->
    <div id="tab-events" class="tab-panel hidden">
      <div class="panel-header">
        <h3>Events</h3>
        <div class="btn-row">
          <button class="btn-primary" id="btn-generate-week">Generate Next Week</button>
          <button class="btn-primary" id="btn-add-event">+ Add Event</button>
        </div>
      </div>
      <div id="admin-event-list"></div>
    </div>

    <!-- Templates tab -->
    <div id="tab-templates" class="tab-panel hidden">
      <div class="panel-header">
        <h3>Session Templates</h3>
        <button class="btn-primary" id="btn-add-template">+ Add Template</button>
      </div>
      <div id="templates-list"></div>
    </div>
  </main>

</div><!-- /#view-app -->

<!-- ── Handicap history modal ──────────────────────────────────────────────── -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span id="modal-title">Handicap History</span>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ── Generic form modal ──────────────────────────────────────────────────── -->
<div id="form-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span id="form-title">Form</span>
      <button class="modal-close" id="form-close">✕</button>
    </div>
    <div id="form-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
